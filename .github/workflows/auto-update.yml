name: Auto update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0 点运行 (北京时间早上 8 点)

permissions:
  contents: write

jobs:
  meta:
    name: Update meta
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Do meta update
        shell: bash
        run: |
          npm install
          npx hexo bangumis -u || echo "Failed to update"

      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: auto-update bangumi data" -a || echo "No changes to commit"
          git push origin main

      - name: Build static site
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
